<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#7b1e3a" />
  <title>酒ログ - 日本酒レビュー</title>
  <style>
    :root{
      --bg:#f7f3ee; --card:#fff; --ink:#2b2522; --muted:#7a706b;
      --accent:#7b1e3a; --accent2:#a84b67; --line:#e6ddd5; --good:#2d7154;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink)}
    header{position:sticky;top:0;z-index:10;background:rgba(247,243,238,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .wrap{max-width:720px;margin:auto;padding:14px 14px calc(95px + env(safe-area-inset-bottom))}
    .top{max-width:720px;margin:auto;padding:14px;display:flex;align-items:center;justify-content:space-between}
    h1{font-size:22px;margin:0}.sub{font-size:12px;color:var(--muted)}
    button,.btn{border:0;border-radius:12px;padding:11px 14px;font-weight:700;font-size:15px;cursor:pointer}
    .primary{background:var(--accent);color:white}.secondary{background:#eee5df;color:var(--ink)}.danger{background:#f5dddd;color:#8a2230}
    .search{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:14px;background:white;font-size:16px;margin:4px 0 12px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
    .stat{background:white;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
    .stat b{display:block;font-size:21px;color:var(--accent)}
    .cards{display:grid;gap:10px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 2px 10px rgba(60,30,20,.04)}
    .card-head{display:flex;gap:12px;align-items:flex-start}
    .thumb{width:72px;height:72px;border-radius:13px;object-fit:cover;background:#eee5df;flex:none}
    .name{font-size:18px;font-weight:800;margin:0 0 2px}.brewery{font-size:13px;color:var(--muted)}
    .stars{color:#d39a22;letter-spacing:1px;margin-top:4px}
    .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
    .tag{font-size:12px;background:#f1e7ea;color:var(--accent);padding:5px 8px;border-radius:999px}
    .memo{margin:10px 0 0;white-space:pre-wrap;font-size:14px;line-height:1.55}
    .date{font-size:12px;color:var(--muted);margin-top:9px}
    .empty{text-align:center;color:var(--muted);padding:50px 20px}
    .fab{position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));width:62px;height:62px;border-radius:50%;background:var(--accent);color:white;font-size:32px;box-shadow:0 8px 24px rgba(123,30,58,.3)}
    dialog{width:min(700px,calc(100% - 20px));max-height:92vh;border:0;border-radius:22px;padding:0;background:var(--bg)}
    dialog::backdrop{background:rgba(30,20,20,.55)}
    .modal{padding:16px}.modal h2{margin:0 0 12px}.grid{display:grid;gap:12px}
    label{font-size:13px;font-weight:700;color:#514944}
    input,select,textarea{width:100%;margin-top:5px;padding:12px;border:1px solid var(--line);border-radius:12px;background:white;font:inherit}
    textarea{min-height:92px;resize:vertical}
    .ranges{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .rangebox{background:white;border:1px solid var(--line);border-radius:14px;padding:10px}
    input[type=range]{padding:0}.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
    .toolbar{display:flex;gap:8px;margin:8px 0 12px;overflow:auto}
    .toolbar button{white-space:nowrap;font-size:13px;padding:9px 11px}
    .photo-preview{width:100%;max-height:220px;object-fit:contain;border-radius:12px;background:#eee5df;display:none}
    @media (max-width:480px){.ranges{grid-template-columns:1fr}.stats{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
<header>
  <div class="top">
    <div><h1>🍶 酒ログ</h1><div class="sub">自分好みの日本酒を忘れない</div></div>
    <button class="secondary" id="exportBtn">保存</button>
  </div>
</header>

<main class="wrap">
  <input id="search" class="search" placeholder="銘柄・酒蔵・メモを検索" />
  <div class="stats">
    <div class="stat"><b id="count">0</b><span>飲んだ本数</span></div>
    <div class="stat"><b id="avg">-</b><span>平均評価</span></div>
    <div class="stat"><b id="fav">-</b><span>最高評価</span></div>
  </div>
  <div class="toolbar">
    <button class="secondary" data-sort="new">新しい順</button>
    <button class="secondary" data-sort="rating">評価順</button>
    <button class="secondary" data-sort="fruity">フルーティー順</button>
    <button class="secondary" id="importBtn">復元</button>
    <input type="file" id="importFile" accept=".json" hidden>
  </div>
  <section id="cards" class="cards"></section>
</main>

<button class="fab" id="addBtn" aria-label="レビューを追加">＋</button>

<dialog id="editor">
  <form id="form" class="modal">
    <h2 id="formTitle">日本酒を記録</h2>
    <input type="hidden" id="editId">
    <div class="grid">
      <label>銘柄名 *
        <input id="name" required placeholder="例：獺祭 純米大吟醸45">
      </label>
      <label>酒蔵・地域
        <input id="brewery" placeholder="例：旭酒造・山口県">
      </label>
      <label>飲んだ日
        <input id="date" type="date">
      </label>
      <label>総合評価
        <select id="rating">
          <option value="5">★★★★★ かなり好き</option>
          <option value="4">★★★★☆ 好き</option>
          <option value="3" selected>★★★☆☆ 普通</option>
          <option value="2">★★☆☆☆ あまり好みではない</option>
          <option value="1">★☆☆☆☆ 苦手</option>
        </select>
      </label>
      <div class="ranges">
        <label class="rangebox">甘さ：<span id="sweetVal">3</span>/5
          <input id="sweet" type="range" min="1" max="5" value="3">
        </label>
        <label class="rangebox">フルーティー：<span id="fruityVal">3</span>/5
          <input id="fruity" type="range" min="1" max="5" value="3">
        </label>
        <label class="rangebox">香り：<span id="aromaVal">3</span>/5
          <input id="aroma" type="range" min="1" max="5" value="3">
        </label>
        <label class="rangebox">キレ：<span id="dryVal">3</span>/5
          <input id="dry" type="range" min="1" max="5" value="3">
        </label>
      </div>
      <label>タイプ
        <select id="type">
          <option>不明</option><option>純米</option><option>純米吟醸</option><option>純米大吟醸</option>
          <option>吟醸</option><option>大吟醸</option><option>本醸造</option><option>生酒</option>
          <option>にごり</option><option>スパークリング</option><option>その他</option>
        </select>
      </label>
      <label>飲んだ場所・店
        <input id="place" placeholder="例：居酒屋〇〇">
      </label>
      <label>写真
        <input id="photo" type="file" accept="image/*" capture="environment">
      </label>
      <img id="preview" class="photo-preview" alt="写真プレビュー">
      <label>感想
        <textarea id="memo" placeholder="例：甘めで桃っぽい香り。後味は軽くて飲みやすい。"></textarea>
      </label>
    </div>
    <div class="actions">
      <button type="button" class="danger" id="deleteBtn" style="display:none">削除</button>
      <button type="button" class="secondary" id="cancelBtn">キャンセル</button>
      <button type="submit" class="primary">登録する</button>
    </div>
  </form>
</dialog>

<script>
const KEY='sake_reviews_v1';
let items=JSON.parse(localStorage.getItem(KEY)||'[]');
let sortMode='new';
let photoData='';

const $=id=>document.getElementById(id);
const save=()=>localStorage.setItem(KEY,JSON.stringify(items));
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const stars=n=>'★'.repeat(n)+'☆'.repeat(5-n);

function render(){
  const q=$('search').value.trim().toLowerCase();
  let list=items.filter(x=>[x.name,x.brewery,x.memo,x.place,x.type].join(' ').toLowerCase().includes(q));
  if(sortMode==='new') list.sort((a,b)=>(b.date||'').localeCompare(a.date||'') || b.created-a.created);
  if(sortMode==='rating') list.sort((a,b)=>b.rating-a.rating);
  if(sortMode==='fruity') list.sort((a,b)=>b.fruity-a.fruity);

  $('count').textContent=items.length;
  $('avg').textContent=items.length?(items.reduce((s,x)=>s+x.rating,0)/items.length).toFixed(1):'-';
  $('fav').textContent=items.length?Math.max(...items.map(x=>x.rating)):'-';

  $('cards').innerHTML=list.length?list.map(x=>`
    <article class="card" onclick="editItem('${x.id}')">
      <div class="card-head">
        ${x.photo?`<img class="thumb" src="${x.photo}" alt="">`:`<div class="thumb" style="display:grid;place-items:center;font-size:30px">🍶</div>`}
        <div style="min-width:0">
          <div class="name">${esc(x.name)}</div>
          <div class="brewery">${esc(x.brewery||'酒蔵・地域未登録')}</div>
          <div class="stars">${stars(x.rating)}</div>
        </div>
      </div>
      <div class="tags">
        <span class="tag">甘さ ${x.sweet}/5</span>
        <span class="tag">フルーティー ${x.fruity}/5</span>
        <span class="tag">香り ${x.aroma}/5</span>
        <span class="tag">キレ ${x.dry}/5</span>
        ${x.type&&x.type!=='不明'?`<span class="tag">${esc(x.type)}</span>`:''}
      </div>
      ${x.memo?`<p class="memo">${esc(x.memo)}</p>`:''}
      <div class="date">${esc(x.date||'日付未登録')}${x.place?' ・ '+esc(x.place):''}</div>
    </article>`).join(''):`<div class="empty">まだレビューがありません。<br>右下の「＋」から最初の一本を登録しよう。</div>`;
}

function resetForm(){
  $('form').reset(); $('editId').value=''; $('date').value=new Date().toISOString().slice(0,10);
  photoData=''; $('preview').style.display='none'; $('preview').src='';
  $('deleteBtn').style.display='none'; $('formTitle').textContent='日本酒を記録';
  ['sweet','fruity','aroma','dry'].forEach(id=>$(id+'Val').textContent=$(id).value);
}

function openNew(){ resetForm(); $('editor').showModal(); }

window.editItem=id=>{
  const x=items.find(i=>i.id===id); if(!x)return;
  $('editId').value=x.id; $('name').value=x.name; $('brewery').value=x.brewery||'';
  $('date').value=x.date||''; $('rating').value=x.rating; $('sweet').value=x.sweet;
  $('fruity').value=x.fruity; $('aroma').value=x.aroma; $('dry').value=x.dry;
  $('type').value=x.type||'不明'; $('place').value=x.place||''; $('memo').value=x.memo||'';
  photoData=x.photo||''; $('preview').src=photoData; $('preview').style.display=photoData?'block':'none';
  ['sweet','fruity','aroma','dry'].forEach(k=>$(k+'Val').textContent=$(k).value);
  $('deleteBtn').style.display='inline-block'; $('formTitle').textContent='レビューを編集';
  $('editor').showModal();
};

$('form').addEventListener('submit',e=>{
  e.preventDefault();
  const id=$('editId').value||crypto.randomUUID();
  const old=items.find(x=>x.id===id);
  const data={
    id,name:$('name').value.trim(),brewery:$('brewery').value.trim(),date:$('date').value,
    rating:+$('rating').value,sweet:+$('sweet').value,fruity:+$('fruity').value,
    aroma:+$('aroma').value,dry:+$('dry').value,type:$('type').value,
    place:$('place').value.trim(),memo:$('memo').value.trim(),photo:photoData,
    created:old?.created||Date.now()
  };
  items=old?items.map(x=>x.id===id?data:x):[data,...items];
  save(); render(); $('editor').close();
});

$('photo').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file)return;
  const img=new Image(), r=new FileReader();
  r.onload=()=>{img.onload=()=>{
    const max=900, scale=Math.min(1,max/Math.max(img.width,img.height));
    const c=document.createElement('canvas'); c.width=img.width*scale; c.height=img.height*scale;
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    photoData=c.toDataURL('image/jpeg',.72); $('preview').src=photoData; $('preview').style.display='block';
  };img.src=r.result}; r.readAsDataURL(file);
});

['sweet','fruity','aroma','dry'].forEach(id=>$(id).addEventListener('input',()=>$(id+'Val').textContent=$(id).value));
$('addBtn').onclick=openNew; $('cancelBtn').onclick=()=>$('editor').close();
$('deleteBtn').onclick=()=>{if(confirm('このレビューを削除しますか？')){items=items.filter(x=>x.id!==$('editId').value);save();render();$('editor').close();}};
$('search').addEventListener('input',render);
document.querySelectorAll('[data-sort]').forEach(b=>b.onclick=()=>{sortMode=b.dataset.sort;render();});

$('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='sake-reviews-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  URL.revokeObjectURL(a.href);
};
$('importBtn').onclick=()=>$('importFile').click();
$('importFile').onchange=async e=>{
  try{
    const data=JSON.parse(await e.target.files[0].text());
    if(!Array.isArray(data))throw new Error();
    if(confirm(`${data.length}件のデータで現在の記録を置き換えますか？`)){items=data;save();render();}
  }catch{alert('読み込めないファイルです。');}
};

render();
</script>
</body>
</html>
